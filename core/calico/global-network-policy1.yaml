apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-cert-manager-webhook-ingress
  namespace: cert-manager
spec:
  selector: app == "webhook"
  types:
  - Ingress
  ingress:
  - action: Allow
    protocol: TCP
    destination: {}
    source: {}

---
apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
  namespace: nginx-ingress
spec:
  types:
  - Ingress
  - Egress
  ingress:
  - action: Allow
  egress:
  - action: Allow
  
---

apiVersion: projectcalico.org/v3
kind: NetworkPolicy
metadata:
  name: allow-ffc-demo-all
  namespace: ffc-demo
spec:
  types:
  - Ingress
  - Egress
  ingress:
  - action: Allow
  egress:
  - action: Allow
