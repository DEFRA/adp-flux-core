apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: allow-nginx-ingress-team-namespaces
spec:
  order: 930
  types:
  - Ingress
  ingress:
  - action: Allow
    destination:
      namespaceSelector: type == "team-namespace"  
    source: 
      namespaceSelector: name == "nginx-ingress"
---
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: allow-team-namespaces-egress
spec:
  order: 940
  types:
  - Egress
  egress:
  - action: Allow
    protocol: TCP
    destination:
      nets:
        - 0.0.0.0/0
    source: 
      namespaceSelector: type == "team-namespace"
---
 apiVersion: projectcalico.org/v3
 kind: GlobalNetworkPolicy
 metadata:
   name: allow-calico-apiserver-egress-tcp
 spec:
   order: 950
   namespaceSelector: kubernetes.io/metadata.name == "calico-apiserver"
   types:
   - Egress
   egress:
   - action: Allow
     protocol: TCP
     destination:
       nets:
        - 0.0.0.0/0
---        
# Allow coredns
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: allow-coredns
spec:
  order: 960
  types:
  - Ingress
  - Egress
  selector: k8s-app == "kube-dns"
  egress:
  - action: Allow
  ingress:
  - action: Allow
---
# Allow dns-egress
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  order: 970
  types:
  - Egress
  egress:
  - action: Allow
    protocol: UDP
    destination:
      nets:
        - 0.0.0.0/0
      ports:
        - 53

---
 # Allow kube-system
 apiVersion: projectcalico.org/v3
 kind: GlobalNetworkPolicy
 metadata:
   name: allow-kube-system
 spec:
   order: 980
   ingress:
   - action: Allow
     destination: 
       namespaceSelector: name == 'kube-system'
     source: {}
   egress:
   - action: Allow
     destination: {}
     source: 
       namespaceSelector: name == 'kube-system'
   types:
   - Ingress
   - Egress

---
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: allow-all-tcp-egress-to-kube-system
spec:
  order: 990
  types:
  - Egress
  egress:
  - action: Allow
    protocol: TCP
    destination: {}
    source: {}
---

# Deny All
apiVersion: projectcalico.org/v3
kind: GlobalNetworkPolicy
metadata:
  name: deny-all
spec:
  order: 1000
  types:
  - Ingress
  - Egress
