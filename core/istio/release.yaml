apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: release-istio-base
  namespace: flux-config
spec:
  chart:
    spec:
      chart: base
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: repository-istio
        namespace: flux-config
  install:
    createNamespace: true
  interval: 10m0s
  releaseName: istio-base
  targetNamespace: istio-system

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: release-istiod
  namespace: flux-config
spec:
  dependsOn:
    - name: release-istio-base
  chart:
    spec:
      chart: istiod
      version: "1.20.2"
      sourceRef:
        kind: HelmRepository
        name: repository-istio
        namespace: flux-config
  install:
    createNamespace: true
  interval: 10m0s
  releaseName: istiod
  targetNamespace: istio-system